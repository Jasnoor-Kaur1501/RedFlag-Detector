<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedFlag Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pink: #ffd6e0;
  --pink-deep: #ffb3c6;
  --hot: #ff2d55;
  --ink: #0d0d0d;
  --white: #fffaf8;
  --muted: #6b5b62;
  --yellow: #fff176;
  --border: #0d0d0d;
  --anton: 'Anton', sans-serif;
  --serif: 'Libre Baskerville', serif;
  --body: 'Space Grotesk', sans-serif;
}

html, body {
  min-height: 100%;
  background: var(--pink);
  color: var(--ink);
  font-family: var(--body);
}

/* HEADER */
header {
  background: var(--ink);
  color: var(--pink);
  padding: 0;
  border-bottom: 4px solid var(--hot);
}

.header-top {
  display: flex;
  align-items: stretch;
  justify-content: space-between;
}

.logo-block {
  padding: 16px 32px;
  border-right: 2px solid rgba(255,214,224,0.15);
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.logo-eyebrow {
  font-family: var(--body);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--hot);
}

.logo-main {
  font-family: var(--anton);
  font-size: 32px;
  letter-spacing: 1px;
  color: var(--white);
  line-height: 1;
}

.logo-main em {
  color: var(--hot);
  font-style: normal;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 0;
}

.h-tag {
  font-family: var(--body);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,214,224,0.4);
  padding: 0 28px;
  border-left: 2px solid rgba(255,214,224,0.1);
}

.breaking-pill {
  background: var(--hot);
  color: var(--white);
  font-family: var(--anton);
  font-size: 12px;
  letter-spacing: 1px;
  padding: 8px 20px;
  margin: 12px 20px;
  animation: flashPill 1.5s infinite;
}

@keyframes flashPill {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* TICKER */
.ticker {
  background: var(--hot);
  padding: 6px 0;
  overflow: hidden;
  white-space: nowrap;
}

.ticker-inner {
  display: inline-block;
  animation: scroll 22s linear infinite;
  font-family: var(--body);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--white);
}

@keyframes scroll {
  from { transform: translateX(100vw); }
  to { transform: translateX(-100%); }
}

/* MAIN */
.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 24px 64px;
}

/* SECTION HEADER */
.section-hed {
  font-family: var(--anton);
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

/* INPUT AREA */
.input-card {
  background: var(--white);
  border: 2px solid var(--border);
  margin-bottom: 16px;
  position: relative;
}

.input-card-header {
  background: var(--ink);
  color: var(--white);
  padding: 10px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.ich-label {
  font-family: var(--anton);
  font-size: 13px;
  letter-spacing: 1px;
}

.ich-hint {
  font-family: var(--body);
  font-size: 10px;
  font-weight: 300;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.08em;
}

textarea {
  width: 100%;
  min-height: 160px;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 400;
  line-height: 1.75;
  color: var(--ink);
  padding: 20px 20px;
  caret-color: var(--hot);
}

textarea::placeholder {
  color: rgba(13,13,13,0.2);
  font-style: italic;
}

.input-footer {
  border-top: 1px solid rgba(13,13,13,0.1);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.char-count {
  font-family: var(--body);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
}

/* ANALYZE BTN */
.analyze-btn {
  width: 100%;
  background: var(--hot);
  border: 2px solid var(--border);
  color: var(--white);
  font-family: var(--anton);
  font-size: 18px;
  letter-spacing: 2px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}

.analyze-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--ink);
  transform: translateX(-101%);
  transition: transform 0.25s ease;
  z-index: 0;
}

.analyze-btn:hover::after { transform: translateX(0); }
.analyze-btn span { position: relative; z-index: 1; }
.analyze-btn:active { transform: scale(0.99); }

/* RESULTS */
.results { display: none; }
.results.visible { display: block; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }

@keyframes popIn {
  from { opacity: 0; transform: scale(0.97); }
  to { opacity: 1; transform: scale(1); }
}

/* VERDICT BANNER */
.verdict-banner {
  border: 3px solid var(--border);
  margin-bottom: 20px;
  overflow: hidden;
}

.vb-top {
  padding: 24px 28px 16px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
}

.vb-score-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
}

.vb-score-num {
  font-family: var(--anton);
  font-size: 72px;
  line-height: 1;
  letter-spacing: -2px;
}

.vb-score-label {
  font-family: var(--body);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 4px;
}

.vb-verdict-text {
  flex: 1;
}
